      // Show a fallback if React crashes or takes too long

          root.innerHTML = '<div style="min-height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;box-sizing:border-box"><div style="text-align:center;max-width:400px"><img src="/logo.jpeg" style="width:80px;height:80px;border-radius:50%;margin-bottom:24px;object-fit:cover"/><h1 style="color:#fff;font-size:24px;margin:0 0 8px">MP3King</h1><p style="color:#a855f7;margin:0 0 24px">Having trouble connecting...</p><p style="color:#888;font-size:14px;margin:0 0 24px">The server may be waking up. Please wait a moment and try again.</p><button onclick="location.reload()" style="background:#7c3aed;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:16px;cursor:pointer">Retry</button></div></div>';
        }
      }, 5000);

      window.addEventListener('error', function(e) {
        clearTimeout(_loadTimeout);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="min-height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;box-sizing:border-box"><div style="text-align:center;max-width:400px"><img src="/logo.jpeg" style="width:80px;height:80px;border-radius:50%;margin-bottom:24px;object-fit:cover"/><h1 style="color:#fff;font-size:24px;margin:0 0 8px">MP3King</h1><p style="color:#ef4444;margin:0 0 8px">Something went wrong</p><p style="color:#888;font-size:13px;margin:0 0 24px;word-break:break-word">' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="background:#7c3aed;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:16px;cursor:pointer">Retry</button></div></div>';
        }
      });
    </script>
