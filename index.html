    <div id="root"></div>
    <script>
      function goError(msg, detail) {
        var url = '/error?msg=' + encodeURIComponent(msg || 'An unexpected error occurred');
        if (detail) url += '&detail=' + encodeURIComponent(detail);
        window.location.href = url;
      }

      // Redirect to /error if React hasn't rendered after 6s
      var _loadTimeout = setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          goError('App failed to load', 'The app took too long to start. The server may be waking up.');
        }
      }, 6000);

      // Redirect to /error on any JS error
      window.addEventListener('error', function(e) {
        // Ignore errors from third-party scripts or already on error page
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError(e.message || 'Runtime error', (e.filename ? e.filename + ' line ' + e.lineno : ''));
      });

      // Catch unhandled promise rejections too
      window.addEventListener('unhandledrejection', function(e) {
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError('Unhandled error', e.reason ? String(e.reason) : 'Promise rejected');
      });

      // Clear timeout once React mounts something
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearTimeout(_loadTimeout);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });
    </script>
  

<style id="mk-injected-styles">
/* ── Shorties progress bar ── */
#mk-prog {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: rgba(255,255,255,.1);
  z-index: 99999;
  pointer-events: none;
  display: none;
}
#mk-prog.show { display: block; }
#mk-prog-fill {
  height: 100%;
  width: 0%;
  background: hsl(50 100% 50%);
  box-shadow: 0 0 8px hsl(50 100% 50% / .8);
  transition: width .3s linear;
}

/* ── Bigger Like / Skip buttons ── */
.mk-side-btn {
  transform: scale(1.5) !important;
  transition: transform .15s ease !important;
}
.mk-side-btn:active { transform: scale(1.25) !important; }

/* ── Double-tap heart burst ── */
@keyframes mk-burst {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1 }
  60%  { transform: translate(-50%,-50%) scale(1.6); opacity: 1 }
  100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0 }
}
.mk-heart {
  position: fixed;
  pointer-events: none;
  font-size: 80px;
  color: hsl(50 100% 50%);
  text-shadow: 0 0 24px hsl(50 100% 50%);
  z-index: 999999;
  animation: mk-burst .55s ease-out forwards;
}
</style>
<script id="mk-injected-script">
(function () {
  'use strict';

  /* ── Progress bar element ── */
  var prog = document.createElement('div');
  prog.id  = 'mk-prog';
  prog.innerHTML = '<div id="mk-prog-fill"></div>';
  document.body.appendChild(prog);
  var fill = prog.querySelector('#mk-prog-fill');

  var audio = null;    // native audio element (JioSaavn / shorties)
  var isPlaying = false;

  /* ── Find audio & wire progress ── */
  function bindAudio(el) {
    if (audio === el) return;
    audio = el;
    prog.classList.add('show');
    el.addEventListener('timeupdate', function () {
      if (el.duration) fill.style.width = (el.currentTime / el.duration * 100) + '%';
    });
    el.addEventListener('play',  function () { isPlaying = true;  syncPlayBtn(); });
    el.addEventListener('pause', function () { isPlaying = false; syncPlayBtn(); });
    el.addEventListener('ended', function () { isPlaying = false; fill.style.width = '0%'; syncPlayBtn(); });
  }

  /* ── Play/Pause button toggle ── */
  // SVG paths used by Lucide Play and Pause icons
  var PLAY_PATH  = 'polygon';   // <polygon points="5 3 19 12 5 21 5 3">
  var PAUSE_PATH = 'line';      // <line x1="19"...> two lines

  function syncPlayBtn() {
    // Find the play/pause button — it contains either a polygon (play) or two rects/lines (pause)
    // We look for a button that ALSO has visible "Play" or "Pause" text, OR is the big round play btn
    var btns = document.querySelectorAll('button');
    btns.forEach(function (btn) {
      var txt = btn.textContent.trim();
      if (txt === 'Play' || txt === 'Pause' || btn.dataset.mkPlay) {
        btn.dataset.mkPlay = '1';
        var svg = btn.querySelector('svg');
        if (!svg) return;
        if (isPlaying) {
          // Replace icon with Pause (two rects)
          svg.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
          // Replace text node
          btn.childNodes.forEach(function (n) {
            if (n.nodeType === 3 && n.textContent.trim()) n.textContent = ' Pause';
          });
        } else {
          svg.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
          btn.childNodes.forEach(function (n) {
            if (n.nodeType === 3 && n.textContent.trim()) n.textContent = ' Play';
          });
        }
      }
    });
  }

  /* ── Make Like + Skip buttons bigger ── */
  function tagSideBtns() {
    document.querySelectorAll('button').forEach(function (btn) {
      if (btn.dataset.mkSide) return;
      var txt = btn.textContent.trim();
      // Like and Skip are the right-side action buttons
      if (txt === 'Like' || txt === 'Skip') {
        btn.classList.add('mk-side-btn');
        btn.dataset.mkSide = '1';
      }
    });
  }

  /* ── Double-tap to like ── */
  var lastTap = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    var gap = now - lastTap;
    lastTap = now;
    if (gap > 50 && gap < 280) {
      var likeBtn = null;
      document.querySelectorAll('button').forEach(function (b) {
        if (b.textContent.trim() === 'Like') likeBtn = b;
      });
      if (!likeBtn) return;
      likeBtn.click();
      var t = e.changedTouches[0];
      var el = document.createElement('div');
      el.className = 'mk-heart';
      el.textContent = '♥';
      el.style.left = t.clientX + 'px';
      el.style.top  = t.clientY + 'px';
      document.body.appendChild(el);
      setTimeout(function () { el.remove(); }, 600);
    }
  }, { passive: true });

  /* ── MutationObserver: pick up React renders ── */
  new MutationObserver(function () {
    var el = document.querySelector('audio');
    if (el) bindAudio(el);
    tagSideBtns();
  }).observe(document.body, { childList: true, subtree: true });

  // Also intercept click on play button to set isPlaying optimistically
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    var txt = btn.textContent.trim();
    if (txt === 'Play' || txt === 'Pause' || btn.dataset.mkPlay) {
      // toggle optimistically; audio events will correct it
      isPlaying = !isPlaying;
      syncPlayBtn();
      prog.classList.add('show');
    }
  }, true);

  // Kick off
  setTimeout(tagSideBtns, 800);
  setTimeout(tagSideBtns, 2500);
})();
</script>
