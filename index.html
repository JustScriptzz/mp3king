  <meta property="og:title" content="MP3King">

  <link rel="stylesheet" crossorigin href="/assets/index-C5Ps9Q9B.css">
  <script src="/assets/mp3ai-widget.js?v=6" defer></script>
</head>

  <body>
    <div id="root"></div>
    <script>
      function goError(msg, detail) {
        var url = '/error?msg=' + encodeURIComponent(msg || 'An unexpected error occurred');
        if (detail) url += '&detail=' + encodeURIComponent(detail);
        window.location.href = url;
      }

      // Redirect to /error if React hasn't rendered after 6s
      var _loadTimeout = setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          goError('App failed to load', 'The app took too long to start. The server may be waking up.');
        }
      }, 6000);

      // Redirect to /error on any JS error
      window.addEventListener('error', function(e) {
        if (window.location.pathname === '/error') return;
        // cross-origin errors (Script error. with no filename) are harmless — ignore
        if (!e.filename || !e.message || e.message === 'Script error.' || e.message === 'Script error') return;
        clearTimeout(_loadTimeout);
        goError(e.message || 'Runtime error', e.filename + ' line ' + e.lineno);
      });

      // Catch unhandled promise rejections too
      window.addEventListener('unhandledrejection', function(e) {
        if (window.location.pathname === '/error') return;
        var r = e.reason ? String(e.reason) : '';
        if (!r || r === 'undefined') return;
        if (e.reason && e.reason.name === 'AbortError') return;
        if (r.includes('play() request was interrupted')) return;
        if (r.includes('Load failed')) return;
        if (r.includes('NetworkError')) return;
        if (r.includes('Failed to fetch')) return;
        if (r.includes('Script error')) return;
        clearTimeout(_loadTimeout);
        goError('Unhandled error', r);
      });

      // Clear timeout once React mounts something
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearTimeout(_loadTimeout);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });

      // Auto-play song from share link: ?song=ID&title=...&artist=...
      (function() {
        var params = new URLSearchParams(window.location.search);
        var songTitle = params.get('title');
        var songArtist = params.get('artist');
        var songId = params.get('song');
        if (!songTitle && !songId) return;

        // Remove query params without touching the pathname (avoids React Router nav)
        history.replaceState({}, '', window.location.pathname);

        // Show fullscreen loading overlay immediately
        var _overlay = document.createElement('div');
        _overlay.id = '_shareLoader';
        _overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:-apple-system,BlinkMacSystemFont,sans-serif';
        _overlay.innerHTML = '<div style="width:90px;height:90px;position:relative;display:flex;align-items:center;justify-content:center"><div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#f5c518;border-right-color:#f5c51855;animation:_shr 1.1s linear infinite"></div><div style="position:absolute;inset:12px;border-radius:50%;border:3px solid transparent;border-top-color:#f5c51899;animation:_shr 1.6s linear infinite reverse"></div><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#f5c518" stroke-width="1.5" style="animation:_shrp 1.8s ease-in-out infinite"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div style="color:#f5c518;font-size:18px;font-weight:700;letter-spacing:.5px">Loading track…</div><div id="_shareLoaderSub" style="color:#666;font-size:13px">' + decodeURIComponent(songTitle||'') + (songArtist ? ' · ' + decodeURIComponent(songArtist) : '') + '</div><style>@keyframes _shr{to{transform:rotate(360deg)}}@keyframes _shrp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}</style>';
        document.body.appendChild(_overlay);

        function _removeOverlay() {
          var el = document.getElementById('_shareLoader');
          if (el) { el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 300); }
        }

        function tryPlay(attempts) {
          if (attempts <= 0) return;
          var p = window._mp3kingPlayer;
          if (p && p.playTrack) {
            // Search iTunes for the real track with audio URL, then play
            var q = encodeURIComponent((songTitle||'') + ' ' + (songArtist||''));
            fetch('https://itunes.apple.com/search?term=' + q + '&media=music&entity=song&limit=5')
              .then(function(r){ return r.json(); })
              .then(function(d){
                var r = d.results && d.results[0];
                if (!r) return;
                var track = {
                  id: r.trackId ? String(r.trackId) : (songId || ('share-'+Date.now())),
                  title: r.trackName || songTitle,
                  artist: r.artistName || songArtist,
                  album: r.collectionName || '',
                  duration: '0:00',
                  coverUrl: (r.artworkUrl100||'/placeholder.svg').replace('100x100','512x512')
                };
                p.playTrack(track);
              setTimeout(function() {
                window.history.pushState({}, '', '/now-playing');
                window.dispatchEvent(new Event('popstate'));
                _removeOverlay();
              }, 400);
              })
              .catch(function(){
                p.playTrack({
                  id: songId || ('share-'+Date.now()),
                  title: songTitle || '',
                  artist: songArtist || '',
                  album: '', duration: '0:00', coverUrl: '/placeholder.svg'
                });
                setTimeout(function() {
                  window.history.pushState({}, '', '/now-playing');
                  window.dispatchEvent(new Event('popstate'));
                  _removeOverlay();
                }, 400);
              });
          } else {
            setTimeout(function() { tryPlay(attempts - 1); }, 500);
          }
        }
        // Wait for React to mount the player bridge
        setTimeout(function() { tryPlay(12); }, 2000);
      })();
    </script>
</body>
</html>
