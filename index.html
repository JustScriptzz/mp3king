    <div id="root"></div>
    <script>
      function goError(msg, detail) {
        var url = '/error?msg=' + encodeURIComponent(msg || 'An unexpected error occurred');
        if (detail) url += '&detail=' + encodeURIComponent(detail);
        window.location.href = url;
      }

      // Redirect to /error if React hasn't rendered after 6s
      var _loadTimeout = setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          goError('App failed to load', 'The app took too long to start. The server may be waking up.');
        }
      }, 6000);

      // Redirect to /error on any JS error
      window.addEventListener('error', function(e) {
        // Ignore errors from third-party scripts or already on error page
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError(e.message || 'Runtime error', (e.filename ? e.filename + ' line ' + e.lineno : ''));
      });

      // Catch unhandled promise rejections too
      window.addEventListener('unhandledrejection', function(e) {
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError('Unhandled error', e.reason ? String(e.reason) : 'Promise rejected');
      });

      // Clear timeout once React mounts something
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearTimeout(_loadTimeout);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });
    </script>
  

<style id="mk-injected-styles">
/* ── Top progress bar ── */
#mk-prog-rail {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.08);
  z-index: 99999;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
#mk-prog-rail.mk-visible { opacity: 1; }
#mk-prog-fill {
  height: 100%;
  width: 0%;
  background: hsl(50 100% 50%);
  box-shadow: 0 0 8px hsl(50 100% 50% / .7);
  transition: width .25s linear;
}

/* ── Bigger heart/like buttons ── */
.mk-big-btn {
  transform: scale(1.55) !important;
  transition: transform .18s cubic-bezier(.175,.885,.32,1.4) !important;
  display: inline-flex !important;
}
.mk-big-btn:active { transform: scale(1.3) !important; }

/* ── Double-tap heart burst ── */
@keyframes mk-pop {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:1 }
  55%  { transform:translate(-50%,-50%) scale(1.5); opacity:1 }
  100% { transform:translate(-50%,-50%) scale(2.2); opacity:0 }
}
.mk-heart-pop {
  position: fixed;
  pointer-events: none;
  font-size: 72px;
  line-height: 1;
  z-index: 999999;
  color: hsl(50 100% 50%);
  text-shadow: 0 0 20px hsl(50 100% 50%);
  animation: mk-pop .55s ease-out forwards;
}
</style>
<script id="mk-injected-script">
(function () {
  'use strict';

  /* ══ 1. PROGRESS BAR via Radix Slider (no audio element needed) ══ */
  var rail  = document.createElement('div');
  rail.id   = 'mk-prog-rail';
  rail.innerHTML = '<div id="mk-prog-fill"></div>';
  document.body.appendChild(rail);
  var fill  = rail.querySelector('#mk-prog-fill');

  function syncProgress() {
    // Radix slider thumb exposes aria-valuenow (0-100)
    var sliders = document.querySelectorAll('[role="slider"][aria-valuemin="0"]');
    // The progress slider is the first one (not volume)
    // Volume slider usually has a different max, but both go 0-100
    // Pick the slider that's inside the player bar or now-playing area
    var best = null;
    sliders.forEach(function(s) {
      var max = parseFloat(s.getAttribute('aria-valuemax') || '0');
      if (max === 100) best = s; // grab last one, player bar slider
    });
    if (best) {
      var val = parseFloat(best.getAttribute('aria-valuenow') || '0');
      if (!isNaN(val)) {
        fill.style.width = val + '%';
        rail.classList.toggle('mk-visible', val > 0 && val < 100);
      }
    }
    requestAnimationFrame(syncProgress);
  }
  requestAnimationFrame(syncProgress);

  /* ══ 2. BIGGER HEART / ACTION BUTTONS via SVG path sniffing ══ */
  // Lucide Heart path fragment (unique enough)
  var HEART_D = '20.84 4.61';
  // Lucide ThumbsUp / ThumbsDown path fragments
  var THUMB_D = 'M7 10v12';

  function tagButtons() {
    document.querySelectorAll('button').forEach(function(btn) {
      if (btn.dataset.mkTagged) return;
      var html = btn.innerHTML;
      if (html.indexOf(HEART_D) > -1 || html.indexOf(THUMB_D) > -1) {
        btn.classList.add('mk-big-btn');
        btn.dataset.mkTagged = '1';
      }
    });
  }

  /* ══ 3. DOUBLE-TAP TO LIKE ══ */
  var lastTap = 0;
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    var gap = now - lastTap;
    lastTap = now;
    if (gap < 280 && gap > 50) {
      // find heart/like button
      var likeBtn = null;
      document.querySelectorAll('button').forEach(function(b) {
        if (b.innerHTML.indexOf(HEART_D) > -1) likeBtn = b;
      });
      if (!likeBtn) return;
      likeBtn.click();
      var t = e.changedTouches[0];
      var el = document.createElement('div');
      el.className = 'mk-heart-pop';
      el.textContent = '♥';
      el.style.left = t.clientX + 'px';
      el.style.top  = t.clientY + 'px';
      document.body.appendChild(el);
      setTimeout(function(){ el.remove(); }, 600);
    }
  }, { passive: true });

  /* ══ 4. MUTATION OBSERVER — re-tag on React re-renders ══ */
  new MutationObserver(tagButtons)
    .observe(document.body, { childList: true, subtree: true });

  // Initial pass after React mounts
  setTimeout(tagButtons, 1000);
  setTimeout(tagButtons, 3000);

})();
</script>
