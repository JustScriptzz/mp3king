    <div id="root"></div>
    <script>
      function goError(msg, detail) {
        var url = '/error?msg=' + encodeURIComponent(msg || 'An unexpected error occurred');
        if (detail) url += '&detail=' + encodeURIComponent(detail);
        window.location.href = url;
      }

      // Redirect to /error if React hasn't rendered after 6s
      var _loadTimeout = setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          goError('App failed to load', 'The app took too long to start. The server may be waking up.');
        }
      }, 6000);

      // Redirect to /error on any JS error
      window.addEventListener('error', function(e) {
        // Ignore errors from third-party scripts or already on error page
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError(e.message || 'Runtime error', (e.filename ? e.filename + ' line ' + e.lineno : ''));
      });

      // Catch unhandled promise rejections too
      window.addEventListener('unhandledrejection', function(e) {
        if (window.location.pathname === '/error') return;
        clearTimeout(_loadTimeout);
        goError('Unhandled error', e.reason ? String(e.reason) : 'Promise rejected');
      });

      // Clear timeout once React mounts something
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearTimeout(_loadTimeout);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });
    </script>
  
<style>
  /* Bigger Like/Dislike GUI */
  button[data-state="active"], button[aria-label*="like" i], button[aria-label*="dislike" i], button[data-testid*="like" i], button[data-testid*="dislike" i] {

  /* Progress Bar for Shorties */
  .custom-progress-bar {
    position: absolute;
    bottom: 120px;
    left: 5%;
    width: 90%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    z-index: 9999;
    cursor: pointer;
    pointer-events: auto;
  }
  .custom-progress-fill {
    height: 100%;
    background: #a855f7;
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px #a855f7;
  }
</style>
<script>
(function() {
  function injectFeatures() {
    const media = document.querySelector('audio') || document.querySelector('video');
    let container = document.querySelector('[class*="short" i]') || document.querySelector('main') || document.body;
    
    if (media && !document.getElementById('custom-progress-bar')) {
      const bar = document.createElement('div');
      bar.id = 'custom-progress-bar';
      bar.className = 'custom-progress-bar';
      bar.innerHTML = '<div class="custom-progress-fill"></div>';
      if(getComputedStyle(container).position === 'static') container.style.position = 'relative';
      container.appendChild(bar);
      
      media.addEventListener('timeupdate', () => {
        const fill = bar.querySelector('.custom-progress-fill');
        if (media.duration) {
          fill.style.width = ((media.currentTime / media.duration) * 100) + '%';
        }
      });
      
      bar.addEventListener('click', (e) => {
        const rect = bar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        media.currentTime = pos * media.duration;
      });
    }

    if (!window._doubleTapBound) {
      window._doubleTapBound = true;
      let lastTap = 0;
      document.addEventListener('touchend', function(e) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 500 && tapLength > 0) {
          const likeBtn = document.querySelector('button[aria-label*="like" i], [data-testid*="like" i], [data-like-btn]');
          if (likeBtn) likeBtn.click();
        }
        lastTap = currentTime;
      });
    }
  }
  setInterval(injectFeatures, 1000);
})();
</script>


<script>
  document.addEventListener('click', function(e) {
    const media = document.querySelector('audio') || document.querySelector('video');
    if (!media) return;
    
    // If user clicks on the media element itself or a generic short container
    const isShortContainer = e.target.closest('[class*="short" i]') || e.target.closest('main');
    if (e.target === media || (isShortContainer && !e.target.closest('button') && !e.target.closest('.custom-progress-bar'))) {
      if (media.paused) {
        media.play();
      } else {
        media.pause();
      }
    }
  });
</script>
