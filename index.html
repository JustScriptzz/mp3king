  <meta property="og:title" content="MP3King">

  <script src="/assets/mp3ai-widget.js?v=5" defer></script>
</head>

  <body>
    <div id="root"></div>
    <script>
      function goError(msg, detail) {
        var url = '/error?msg=' + encodeURIComponent(msg || 'An unexpected error occurred');
        if (detail) url += '&detail=' + encodeURIComponent(detail);
        window.location.href = url;
      }

      // Redirect to /error if React hasn't rendered after 6s
      var _loadTimeout = setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          goError('App failed to load', 'The app took too long to start. The server may be waking up.');
        }
      }, 6000);

      // Redirect to /error on any JS error
      window.addEventListener('error', function(e) {
        if (window.location.pathname === '/error') return;
        // cross-origin errors (Script error. with no filename) are harmless — ignore
        if (!e.filename || !e.message || e.message === 'Script error.' || e.message === 'Script error') return;
        clearTimeout(_loadTimeout);
        goError(e.message || 'Runtime error', e.filename + ' line ' + e.lineno);
      });

      // Catch unhandled promise rejections too
      window.addEventListener('unhandledrejection', function(e) {
        if (window.location.pathname === '/error') return;
        var r = e.reason ? String(e.reason) : '';
        if (!r || r === 'undefined') return;
        if (e.reason && e.reason.name === 'AbortError') return;
        if (r.includes('play() request was interrupted')) return;
        if (r.includes('Load failed')) return;
        if (r.includes('NetworkError')) return;
        if (r.includes('Failed to fetch')) return;
        if (r.includes('Script error')) return;
        clearTimeout(_loadTimeout);
        goError('Unhandled error', r);
      });

      // Clear timeout once React mounts something
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearTimeout(_loadTimeout);
          _observer.disconnect();
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true });

      // Auto-play song from share link: ?song=ID&title=...&artist=...
      (function() {
        var params = new URLSearchParams(window.location.search);
        var songTitle = params.get('title');
        var songArtist = params.get('artist');
        var songId = params.get('song');
        if (!songTitle && !songId) return;

        // Remove query params without touching the pathname (avoids React Router nav)
        history.replaceState({}, '', window.location.pathname);

        function tryPlay(attempts) {
          if (attempts <= 0) return;
          var p = window._mp3kingPlayer;
          if (p && p.playTrack) {
            // Search iTunes for the real track with audio URL, then play
            var q = encodeURIComponent((songTitle||'') + ' ' + (songArtist||''));
            fetch('https://itunes.apple.com/search?term=' + q + '&media=music&entity=song&limit=5')
              .then(function(r){ return r.json(); })
              .then(function(d){
                var r = d.results && d.results[0];
                if (!r) return;
                var track = {
                  id: r.trackId ? String(r.trackId) : (songId || ('share-'+Date.now())),
                  title: r.trackName || songTitle,
                  artist: r.artistName || songArtist,
                  album: r.collectionName || '',
                  duration: '0:00',
                  coverUrl: (r.artworkUrl100||'/placeholder.svg').replace('100x100','512x512')
                };
                p.playTrack(track);
              })
              .catch(function(){
                // fallback: play with minimal info, let the player find the stream
                p.playTrack({
                  id: songId || ('share-'+Date.now()),
                  title: songTitle || '',
                  artist: songArtist || '',
                  album: '', duration: '0:00', coverUrl: '/placeholder.svg'
                });
              });
          } else {
            setTimeout(function() { tryPlay(attempts - 1); }, 500);
          }
        }
        // Wait for React to mount the player bridge
        setTimeout(function() { tryPlay(12); }, 2000);
      })();
    </script>
</body>
</html>
