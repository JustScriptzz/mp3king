<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3King - Connecting...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #fff;
    font-family: sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 20px; text-align: center;
  }
  .logo { font-size: 40px; font-weight: 900; }
  .logo span { color: #FFD700; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,215,0,0.2);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #aaa; font-size: 14px; }
  .err { color: #ff4757; background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); padding: 16px; border-radius: 8px; max-width: 360px; }
  a { color: #FFD700; }
</style>
</head>
<body>
<div class="logo">.mp3<span>KING</span></div>
<div class="spinner" id="spin"></div>
<p id="msg">Completing login...</p>
<script>
(function() {
  const p = new URLSearchParams(window.location.search);
  const code  = p.get('code');
  const error = p.get('error');
  const st    = p.get('state');

  if (error) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('msg').innerHTML =
      '<div class="err"><b>Login cancelled</b><br>' + error + '<br><br><a href="/">Try again</a></div>';
    return;
  }

  if (!code) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('msg').innerHTML =
      '<div class="err">No code received.<br><a href="/">Go home</a></div>';
    return;
  }

  var dest = window.location.origin + '/';
  var q = '?code=' + encodeURIComponent(code);
  if (st) q += '&state=' + encodeURIComponent(st);
  dest += q;

  document.getElementById('msg').textContent = 'Authenticated! Loading...';
  window.location.replace(dest);
})();
</script>
</body>
</html>
